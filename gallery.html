<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f4f6f9;
}

/* HEADER */
header{
  background:#1e3a8a;
  color:white;
  padding:15px 20px;
}

header h1{
  margin:0;
  font-size:22px;
}

header a{
  color:white;
  text-decoration:none;
  font-size:14px;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:30px auto;
  background:white;
  padding:30px;
  border-radius:8px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.container h2{
  text-align:center;
  color:#1e3a8a;
  margin-bottom:25px;
}

/* GALLERY GRID */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.gallery-grid img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}

.gallery-grid img:hover{
  transform:scale(1.03);
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:8px;
}

/* CLOSE */
.lightbox span{
  position:absolute;
  top:20px;
  right:30px;
  font-size:35px;
  color:white;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .container{
    margin:15px;
    padding:20px;
  }

  .gallery-grid img{
    height:150px;
  }
}
</style>
</head>

<body>

<header>
  <a href="index.html">← Back to Home</a>
  <h1 align="center">GOVT. ITOT JAMMU</h1>
</header>

<div class="container">
  <h2>Photo Gallery</h2>

  <div class="gallery-grid">
    <!-- Tum yahan photos add/remove kar sakte ho -->
    <img src="a.jpeg" onclick="openImg(this.src)">
    <img src="b.jpeg" onclick="openImg(this.src)">
    <img src="c.jpeg" onclick="openImg(this.src)">
    <img src="d.jpeg" onclick="openImg(this.src)">
    <img src="e.jpeg" onclick="openImg(this.src)">
    <img src="f.jpeg" onclick="openImg(this.src)">
    <img src="g.jpeg" onclick="openImg(this.src)">
    <img src="h.jpeg" onclick="openImg(this.src)">
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span onclick="closeImg()">×</span>
  <img id="lightboxImg">
</div>

<script>
function openImg(src){
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeImg(){
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
