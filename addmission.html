<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admission Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f4f6f9;
}

/* HEADER */
header{
  background:#1e3a8a;
  color:white;
  padding:15px 20px;
}

header h1{
  margin:0;
  font-size:22px;
}

header a{
  color:white;
  text-decoration:none;
  font-size:14px;
}

/* FORM CONTAINER */
.container{
  max-width:900px;
  margin:30px auto;
  background:white;
  padding:30px;
  border-radius:8px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.container h2{
  text-align:center;
  color:#1e3a8a;
  margin-bottom:20px;
}

/* FORM GRID */
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

.form-group label{
  font-size:14px;
  margin-bottom:5px;
  color:#374151;
}

.form-group input,
.form-group select,
.form-group textarea{
  padding:10px;
  border:1px solid #cbd5e1;
  border-radius:5px;
  font-size:14px;
}

.form-group textarea{
  resize:none;
}

/* FULL WIDTH */
.full{
  grid-column:1 / -1;
}

/* BUTTON */
button{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#1e3a8a;
  color:white;
  border:none;
  font-size:16px;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

/* FOOTER NOTE */
.note{
  margin-top:15px;
  font-size:13px;
  color:#6b7280;
  text-align:center;
}

/* MOBILE */
@media(max-width:768px){
  .form-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy.....",
  authDomain: "govtitotjammu.firebaseapp.com",
  databaseURL: "https://govtitotjammu-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "govtitotjammu",
  storageBucket: "govtitotjammu.appspot.com",
  messagingSenderId: "836880995224",
  appId: "1:836880995224:web:78a4112e61fd224fe511ed"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.addEventListener("DOMContentLoaded", () => {

  const form = document.getElementById("admissionForm");

  form.addEventListener("submit", function(e){
    e.preventDefault();

    const data = {
      name: form.querySelectorAll("input")[0].value,
      father: form.querySelectorAll("input")[1].value,
      dob: form.querySelectorAll("input")[2].value,
      mobile: form.querySelectorAll("input")[4].value,
      trade: form.querySelectorAll("select")[1].value,
      time: new Date().toLocaleString()
    };

    push(ref(db, "admissions"), data)
      .then(() => {
        alert("Admission submitted successfully ✅");
        form.reset();
      })
      .catch(err => alert(err.message));
  });

});
</script>

<body>

<header>
  <a href="index.html">← Back to Home</a>
  <h1 align="center">GOVT. ITOT JAMMU</h1>
</header>

<div class="container">
  <h2>Admission Application Form</h2>

  <form id="admissionForm">

    <div class="form-grid">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" required>
      </div>

      <div class="form-group">
        <label>Father's Name</label>
        <input type="text" required>
      </div>

      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" required>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select required>
          <option value="">Select</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email">
      </div>

      <div class="form-group">
        <label>Trade Applied For</label>
        <select required>
          <option value="">Select Trade</option>
          <option>CITS - CSA</option>
          <option>CITS - Electrician</option>
          <option>CITS - Fitter</option>
        </select>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select>
          <option>General</option>
          <option>SC</option>
          <option>ST</option>
          <option>OBC</option>
        </select>
      </div>

      <div class="form-group full">
        <label>Address</label>
        <textarea rows="3"></textarea>
      </div>

      <div class="form-group">
        <label>Upload Photograph</label>
        <input type="file" accept="image/*">
      </div>

      <div class="form-group">
        <label>Upload Signature</label>
        <input type="file">
      </div>
      <div class="form-group">
        <label>Upload Domicile Certificate</label>
        <input type="file">
      </div>
      <div class="form-group">
        <label>Upload Catagory Certificate</label>
        <input type="file">
      </div>
      <div class="form-group">
        <label>Upload Qualification Certificate</label>
        <input type="file">
      </div>
    </div>

    <button type="submit">Submit Application</button>
  </form>

  <div class="note">
    Note: Submission of form does not guarantee admission. Verification will be done by the institute.
  </div>
</div>

</body>
</html>
